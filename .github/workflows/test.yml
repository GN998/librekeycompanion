name: Android CI Build

on:
  push:
    branches: [ "test" ]
    paths-ignore: 
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Force Node 24 for older actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ==========================================
      # 1. Environment Setup
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          # Read-only cache for PRs
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==========================================
      # 2. Build Process (已移除未配置的 Code Quality Check 步骤)
      # ==========================================
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --parallel --build-cache --no-daemon

      # ==========================================
      # 3. CI-based APK Signing
      # ==========================================
      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign_app 
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      # ==========================================
      # 4. Artifact Upload
      # ==========================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: librekeycompanion
          # Fetch signed APK path dynamically
          path: ${{ steps.sign_app.outputs.signedFile }}
          if-no-files-found: error
          retention-days: 7
